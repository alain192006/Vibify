<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0a2e"/>
      <stop offset="50%"  stop-color="#0d2d1a"/>
      <stop offset="100%" stop-color="#1db954"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1db954"/>
      <stop offset="100%" stop-color="#a8ff78"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Equalizer bars — centered, symmetrical, forming a V-hill shape -->
  <g filter="url(#glow)" fill="url(#bar)">
    <rect x="72"  y="290" width="52" height="132" rx="26"/>
    <rect x="144" y="230" width="52" height="192" rx="26"/>
    <rect x="216" y="148" width="52" height="274" rx="26"/>
    <rect x="288" y="220" width="52" height="202" rx="26"/>
    <rect x="360" y="272" width="52" height="150" rx="26"/>
  </g>

  <!-- Shine overlay -->
  <rect width="512" height="256" rx="110" fill="rgba(255,255,255,0.04)"/>
</svg>
